name: Build NDD Plugin (StringsToSqlList)

# 触发条件：推送到 main/master、或在网页上手动点 "Run workflow"
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # windows-2019 免费队列经常排队数小时，改用 windows-latest（Windows Server 2022 + VS 2022）
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python (for aqtinstall)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt 5.15.2 (MSVC 2019 x64)
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 -O C:\Qt

      - name: Download & build QScintilla 2.14.1
        # 说明：GitHub Actions 每个 run: 是一个独立的 shell 子进程，
        # 所以 call vcvars64.bat / set PATH / cd 都只在当前块有效。
        # 必须把所有命令写在同一个 run: 块里。
        run: |
          curl -L -o qscintilla.tar.gz https://www.riverbankcomputing.com/static/Downloads/QScintilla/2.14.1/QScintilla_src-2.14.1.tar.gz
          tar xzf qscintilla.tar.gz
          cd QScintilla_src-2.14.1\src
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PATH=C:\Qt\5.15.2\msvc2019_64\bin;%PATH%
          qmake qscintilla.pro
          nmake release
          nmake install

      - name: Build plugin DLL
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PATH=C:\Qt\5.15.2\msvc2019_64\bin;%PATH%
          qmake ndd-strings-to-sqlist.pro
          nmake release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndd-strings-to-sqlist-dll
          path: build/release/*.dll
          retention-days: 30
